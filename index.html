<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최강민 - Digital Nomad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <div class="profile-image">
                    <div class="avatar">🌿</div>
                </div>
                <h1 class="name">최강민</h1>
                <p class="tagline">Digital Nomad · Nature Lover</p>
            </div>
        </section>

        <!-- About Section -->
        <section class="about">
            <h2 class="section-title">About Me</h2>
            <div class="info-grid">
                <div class="info-card">
                    <span class="icon">💼</span>
                    <div class="info-content">
                        <h3>현재</h3>
                        <p>백수</p>
                    </div>
                </div>
                <div class="info-card">
                    <span class="icon">🎮</span>
                    <div class="info-content">
                        <h3>취미</h3>
                        <p>메이플키우기</p>
                    </div>
                </div>
                <div class="info-card">
                    <span class="icon">💪</span>
                    <div class="info-content">
                        <h3>운동</h3>
                        <p>크로스핏, 필라테스, 헬스, 러닝</p>
                    </div>
                </div>
                <div class="info-card">
                    <span class="icon">✨</span>
                    <div class="info-content">
                        <h3>MBTI</h3>
                        <p>ENFP</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- SNS Section -->
        <section class="sns">
            <h2 class="section-title">Connect</h2>
            <div class="sns-links">
                <a href="https://instagram.com/choikangm" class="sns-link instagram" target="_blank" rel="noopener noreferrer">
                    <span class="sns-icon">📷</span>
                    <span class="sns-name">Instagram</span>
                    <span class="sns-handle">@choikangm</span>
                </a>
                <a href="https://linkedin.com/in/choikangm" class="sns-link linkedin" target="_blank" rel="noopener noreferrer">
                    <span class="sns-icon">💼</span>
                    <span class="sns-name">LinkedIn</span>
                    <span class="sns-handle">@choikangm</span>
                </a>
                <a href="https://velog.io/@choikangm" class="sns-link velog" target="_blank" rel="noopener noreferrer">
                    <span class="sns-icon">✍️</span>
                    <span class="sns-name">Velog</span>
                    <span class="sns-handle">@choikangm</span>
                </a>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>🌱 Living and coding wherever inspiration strikes 🌍</p>
        </footer>
    </div>
</body>
</html>
